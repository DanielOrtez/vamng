{% extends "_base.html" %}

{% block title %}
    {{ title|default:"Routes" }}
{% endblock %}

{% block content %}
    <section class="grid grid-cols-1 lg:grid-cols-4 gap-y-4 gap-x-0 lg:gap-x-4 m-auto min-w-3/4" id="main_container">
        <div class="card col-span-3 order-2 lg:order-1 h-fit border-base-content/25 border">
            <div class="card-header"><h1 class="card-title">{{ title }}</h1></div>
            <div class="card-body overflow-x-auto"
                 id="table">{% include "operations/partials/_table_routes.html" %}</div>
        </div>
        {% include "operations/partials/_filter_routes.html" %}
    </section>
{% endblock %}
