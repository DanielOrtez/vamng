{% extends "_base.html" %}
{% load core_filters %}

{% block title %}Routes{% endblock %}

{% block content %}
    <section class="grid lg:grid-cols-4 gap-4 m-auto lg:w-6/8" id="main_container">
        <div class="bg-base-200 col-span-3 rounded-box border border-base-300 p-4 lg:mt-8 order-2 lg:order-1 h-fit">
            <h1 class="font-bold text-3xl my-4 pb-4 lg:my-0">Routes from {{ request.user.curr_airport }} <i
                    class="flag2x {{ request.user.curr_airport.country.flag_css }}"></i></h1>
            <div class="overflow-x-auto" id="table">{% include "operations/partials/_table_routes.html" %}</div>
        </div>
        {% include "operations/partials/_filter_routes.html" %}
    </section>
{% endblock %}
