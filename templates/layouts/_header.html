<header class="navbar bg-base-300 shadow-sm">
    <div class="navbar-start">
        <div class="dropdown">
            <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                 d="M4 6h16M4 12h8m-8 6h16"></path>
                </svg>
            </div>
            <ul tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow font-item font-semibold">
                <li><a>About us</a></li>
                <li><a>Pilots</a></li>
                <li><a>Operations</a></li>
            </ul>
        </div>
        <div class="btn btn-ghost text-xl font-title"><a href="/">VAMng</a></div>
    </div>
    <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal px-1 font-item font-semibold">
            <li><a>About us</a></li>
            <li><a>Pilots</a></li>
            <li><a>Operations</a></li>
        </ul>
    </div>
    <div class="navbar-end">
        {% if user.is_authenticated %}
            <div class="dropdown dropdown-end">
                <div tabindex="0" role="button" class="btn btn-ghost">
                    <div class="w-10">{{ user.first_name }}</div>
                </div>
                <ul class="menu menu-sm dropdown-content bg-base-300 rounded-box z-1 mt-3 w-52 p-2 shadow font-item font-semibold"
                    tabindex="-1">
                    <li><a href="{% url 'profile' %}" class="p-3 text-sm">Profile</a></li>
                    {% if user.is_staff %}
                        <li><a href="{% url 'admin:index' %}" class="p-3 text-sm">Admin</a></li>
                    {% endif %}
                    <li>
                        <a class="p-3 text-sm">
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <input class="cursor-pointer" type="submit" value="Logout">
                            </form>
                        </a>
                    </li>
                </ul>
            </div>
        {% else %}
            <a class="btn btn-primary {% if request.path == '/login/' %} btn-disabled {% endif %} mr-2 font-semibold"
               href="{% url 'login' %}">Login</a>
            <a class="btn btn-neutral {% if request.path == '/register/' %} btn-disabled {% endif %} font-semibold"
               href="{% url 'register' %}">Register</a>
        {% endif %}
    </div>
</header>
