<div class="flex flex-col items-center container m-auto">
    <div class="card lg:w-xl rounded-box border p-4 lg:mt-8">
        <div class="card-header">
            <h1 class="card-title">{{ form_title }}</h1>
        </div>
        <div class="card-body">
            <form action="{{ form_action }}" method="post" class="grid gap-4 p-4">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">

                {% for field in form %}
                    <div>
                        <label class="label" for="{{ field.name }}">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
                <input class="btn btn-lg btn-soft mt-4" type="submit" value="{{ submit_value }}">
            </form>
        </div>
    </div>
</div>
