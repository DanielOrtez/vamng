<div class="flex flex-col items-center container m-auto">
    <h1 class="text-center font-bold text-3xl my-4 lg:my-0">{{ form_title }}</h1>
    <div class="bg-base-200 border-base-300 w-sm lg:w-lg rounded-box border p-4 lg:mt-8">
        <form action="{{ form_action }}" method="post" class="grid gap-4 p-4">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label class="label" for="{{ field.name }}">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <input class="btn btn-neutral mt-4" type="submit" value="{{ submit_value }}">
        </form>
    </div>
</div>
